name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '18'
  COMPOSE_FILE: docker-compose.yml
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_REPO_FRONTEND: your-private-repo/frontend
  DOCKERHUB_REPO_BACKEND: your-private-repo/backend

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install docker-compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/download/v2.24.5/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose --version

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-docker-${{ hashFiles('frontend/Dockerfile', 'backend/Dockerfile', 'frontend/package-lock.json', 'backend/package-lock.json') }}
          restore-keys: ${{ runner.os }}-docker-

      - name: Build Docker images
        run: docker-compose -f ${{ env.COMPOSE_FILE }} build

      - name: Run ESLint (Frontend)
        run: docker-compose -f ${{ env.COMPOSE_FILE }} run frontend npm run lint

      - name: Run ESLint (Backend)
        run: docker-compose -f ${{ env.COMPOSE_FILE }} run backend npm run lint

  build-and-test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      mongo:
        image: mongo:latest
        ports:
          - 27017:27017
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install docker -compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/download/v2.24.5/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose --version

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-docker-${{ hashFiles('frontend/Dockerfile', 'backend/Dockerfile', 'frontend/package-lock.json', 'backend/package-lock.json') }}
          restore-keys: ${{ runner.os }}-docker-

      - name: Build Docker images
        run: docker-compose -f ${{ env.COMPOSE_FILE }} build

      - name: Start services
        run: docker-compose -f ${{ env.COMPOSE_FILE }} up -d

      - name: Wait for services to be ready
        run: sleep 10

      - name: Test Frontend
        run: docker-compose -f ${{ env.COMPOSE_FILE }} run frontend npm test -- --coverage

      - name: Test Backend
        run: docker-compose -f ${{ env.COMPOSE_FILE }} run backend npm test -- --coverage

      - name: Store coverage reports
        run: |
          mkdir -p coverage
          docker cp $(docker-compose -f ${{ env.COMPOSE_FILE }} ps -q frontend):/app/coverage coverage/frontend
          docker cp $(docker-compose -f ${{ env.COMPOSE_FILE }} ps -q backend):/app/coverage coverage/backend

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v3
        with:
          name: coverage
          path: coverage/

      - name: Cleanup
        if: always()
        run: docker-compose -f ${{ env.COMPOSE_FILE }} down --volumes

  push-to-dockerhub:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install docker-compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/download/v2.24.5/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose --version

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker images
        run: docker-compose -f ${{ env.COMPOSE_FILE }} build

      - name: Tag and Push Frontend Image
        run: |
          docker tag frontend:${{ github.sha }} ${{ env.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPO_FRONTEND }}:${{ github.sha }}
          docker tag frontend:${{ github.sha }} ${{ env.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPO_FRONTEND }}:latest
          docker push ${{ env.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPO_FRONTEND }}:${{ github.sha }}
          docker push ${{ env.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPO_FRONTEND }}:latest

      - name: Tag and Push Backend Image
        run: |
          docker tag backend:${{ github.sha }} ${{ env.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPO_BACKEND }}:${{ github.sha }}
          docker tag backend:${{ github.sha }} ${{ env.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPO_BACKEND }}:latest
          docker push ${{ env.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPO_BACKEND }}:${{ github.sha }}
          docker push ${{ env.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPO_BACKEND }}:latest

  sonar:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install docker-compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/download/v2.24.5/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose --version

      - name: Download coverage artifacts
        uses: actions/download-artifact@v3
        with:
          name: coverage
          path: coverage/

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate Check
        uses: sonarsource/sonarqube-quality-gate-action@master
        with:
          scanMetadataReportFile: .scannerwork/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        timeout-minutes: 5