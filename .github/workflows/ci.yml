name: CI/CD Pipeline

on:
  push:
    branches: [ add-ci ]
  pull_request:
    branches: [ add-ci ]

env:
  NODE_VERSION: '18'
  COMPOSE_FILE: docker-compose.yml  # Your Docker Compose file

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Docker images
        run: docker-compose -f ${{ env.COMPOSE_FILE }} build

      - name: Run ESLint (Frontend)
        run: docker-compose -f ${{ env.COMPOSE_FILE }} run frontend npm run lint

      - name: Run ESLint (Backend)
        run: docker-compose -f ${{ env.COMPOSE_FILE }} run backend npm run lint

  build-and-test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      # Add any required services (e.g., database)
      mongo:
        image: mongo:latest
        ports:
          - 27017:27017
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Docker images
        run: docker-compose -f ${{ env.COMPOSE_FILE }} build

      - name: Start services
        run: docker-compose -f ${{ env.COMPOSE_FILE }} up -d

      - name: Wait for services to be ready
        run: sleep 10  # Adjust based on your services' startup time

      - name: Test Frontend
        run: docker-compose -f ${{ env.COMPOSE_FILE }} run frontend npm test -- --coverage

      - name: Test Backend
        run: docker-compose -f ${{ env.COMPOSE_FILE }} run backend npm test -- --coverage

      - name: Store coverage reports
        run: |
          mkdir -p coverage
          docker cp $(docker-compose -f ${{ env.COMPOSE_FILE }} ps -q frontend):/app/coverage coverage/frontend
          docker cp $(docker-compose -f ${{ env.COMPOSE_FILE }} ps -q backend):/app/coverage coverage/backend

      - name: Cleanup
        if: always()
        run: docker-compose -f ${{ env.COMPOSE_FILE }} down --volumes

  sonar:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Docker images
        run: docker-compose -f ${{ env.COMPOSE_FILE }} build

      - name: Copy coverage reports
        run: |
          mkdir -p coverage/frontend coverage/backend
          # Note: These paths assume coverage was generated in previous job
          # You might need to use artifacts to share between jobs

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate Check
        uses: sonarsource/sonarqube-quality-gate-action@master
        with:
          scanMetadataReportFile: .scannerwork/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        timeout-minutes: 5